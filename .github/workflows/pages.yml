name: Pages

# Auto-deploy /docs (the static site: the ecosystem hub at docs/index.html +
# web7/ the canonical lab + generated plates) to GitHub Pages on every push to
# main. The root docs/index.html is the Catalytic-Silence hub; it links into
# web7/. (web6/ is retained alongside as the prior client, for comparison.)
#
# One-time repo setup: Settings → Pages → Source → GitHub Actions.
# After that, every merge to main republishes the site.

on:
  push:
    branches: [main]
  # Run the JS gate on PRs too, so a broken client can't reach main. Build/
  # deploy are guarded to push events; PRs run the `test` job only.
  pull_request:
    paths: ["docs/**"]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Web6 lab smoke tests
        run: node docs/web6/tests/smoke.mjs
      - name: Web6 living-colony tests
        run: node docs/web6/tests/colony.mjs
      - name: Web6 apparatus runtime verification
        run: |
          npm install three@0.162.0 --no-save --no-package-lock --silent
          node docs/web6/tests/runtime.mjs
      - name: Web7 lab smoke tests
        run: node docs/web7/tests/smoke.mjs
      - name: Web7 design-contract tests
        run: node docs/web7/tests/design.mjs
      - name: Web7 apparatus runtime verification
        run: node docs/web7/tests/runtime.mjs   # three already installed above
      - name: Web7 apparatus animation verification
        run: node docs/web7/tests/anim.mjs      # proves each experiment visibly runs
      - name: Web7 controls-contract tests
        run: node docs/web7/tests/controls.mjs  # presets wired to real params + minerals localises (REV-18)
      - name: Web8 guided-lab smoke tests
        run: node docs/web8/tests/smoke.mjs
      - name: Web8 design-contract tests
        run: node docs/web8/tests/design.mjs
      - name: Web8 apparatus runtime verification
        run: node docs/web8/tests/runtime.mjs   # three already installed above
      - name: Web8 apparatus animation verification
        run: node docs/web8/tests/anim.mjs
      - name: Web8 controls-contract tests
        run: node docs/web8/tests/controls.mjs  # presets wired + minerals localises + vents PMF (web8 parity)
      - name: Web8 guide intent-parser tests
        run: node docs/web8/tests/intents.mjs   # ask-the-amoeba request -> action mapping
      - name: Ontogeny engine + page tests
        run: |
          node docs/ontogeny/tests/ontogeny.mjs
          node docs/ontogeny/tests/smoke.mjs

  build:
    needs: test
    # Only build/deploy on a real push to main (or manual dispatch); PRs stop
    # after the `test` gate.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Upload /docs as Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
