name: Pages

# Auto-deploy /docs (the static demo bundle: web/, web2/, web3/, web4/, generated/)
# to GitHub Pages on every push to main.
#
# One-time repo setup: Settings → Pages → Source → GitHub Actions.
# After that, no manual steps are needed — every merge to main
# republishes the site.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Web2 rule smoke tests
        run: node docs/web2/tests/smoke.mjs
      - name: Web3 rule smoke tests
        run: node docs/web3/tests/smoke.mjs
      - name: Web4 lab smoke tests
        run: node docs/web4/tests/smoke.mjs

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Upload /docs as Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
