name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint — ruff check
        run: ruff check cellauto tests

      - name: Lint — ruff format
        run: ruff format --check cellauto tests

      - name: Type check — mypy
        # Drop --no-error-summary so the "Success: X files checked" line is
        # visible in CI logs — without it a regression to "0 errors over 0
        # files" would be undetectable. (PUNCHLIST P4-2)
        run: mypy cellauto --ignore-missing-imports

      - name: Type check (strict, advisory) — mypy --strict
        # Aspirational strict-mode pass. Allowed to fail today so contributors
        # see where the gap is without blocking; promote to required once
        # the warnings are cleaned up. (PUNCHLIST P4-2)
        run: mypy cellauto --ignore-missing-imports --strict
        continue-on-error: true

      - name: Tests (pytest + coverage)
        # 80% threshold applies to the science layer (engine + rules) only;
        # cellauto/app.py, mascot.py, renderer.py, web/server.py, web/wsgi.py,
        # __main__.py are explicitly omitted from coverage in pyproject.toml.
        # See PUNCHLIST P4-3 for the full caveat.
        run: pytest --cov=cellauto --cov-report=term-missing --cov-fail-under=80

      - name: Headless smoke — CLI simulate
        run: python -m cellauto simulate --rule natural-selection --grid 30 --steps 25 --seed 1

      - name: Headless smoke — CLI export
        run: python -m cellauto export --rule conway --grid 30 --steps 20 --fps 8 --out /tmp/ci-smoke.gif
        if: runner.os != 'Windows'

      - name: Headless smoke — CLI export (Windows)
        run: python -m cellauto export --rule conway --grid 30 --steps 20 --fps 8 --out $env:TEMP\ci-smoke.gif
        if: runner.os == 'Windows'

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install project + web extras
        # Audit the actual resolved environment (Flask, gunicorn, Pillow,
        # numpy, every transitive dep) instead of just the two lines in
        # requirements.txt. PUNCHLIST P4-1.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[web,dev]"
          pip install pip-audit
      - name: Audit installed environment
        run: pip-audit
