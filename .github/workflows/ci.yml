name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check cellauto tests
      - name: Tests (pytest)
        run: pytest --cov=cellauto --cov-report=term-missing
      - name: Headless smoke test (CLI simulate)
        run: python -m cellauto simulate --rule natural-selection --grid 30 --steps 25 --seed 1
