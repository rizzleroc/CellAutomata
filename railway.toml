# Railway service config.
#
# Forces the Dockerfile builder so Nixpacks doesn't try to install the
# cellauto Python package (Pillow/numpy build) — the Railway service only
# needs to serve docs/, not run the simulator.
#
# Route map (served from docs/):
#   /            → docs/index.html       (redirects to /web2/)
#   /web2/       → web 2.0 multi-rule sandbox  (headline)
#   /web/        → web 1.0 Gray-Scott museum plate  (preserved)
#   /generated/  → static stage plates referenced by both demos

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
healthcheckPath = "/web2/"
healthcheckTimeout = 30
