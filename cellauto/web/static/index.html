<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>cellauto</title>
    <meta
      name="description"
      content="Scientifically-grounded cellular sandbox. The abiogenesis pipeline, Conway's Life and Wolfram 1D, run live in your browser via the same Python engine the desktop GUI uses."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to canvas</a>

    <!-- ────── Top bar ───────────────────────────────────────────────── -->
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark"></span>
        <span class="brand-name">cellauto</span>
      </div>

      <div class="topbar-config">
        <label class="topbar-field">
          <span>rule</span>
          <select id="rule"></select>
        </label>
        <label class="topbar-field narrow">
          <span>grid</span>
          <input id="grid" type="number" min="8" max="240" step="4" value="80" />
        </label>
        <label class="topbar-field narrow">
          <span>seed</span>
          <input id="seed" type="number" placeholder="random" />
        </label>
      </div>

      <div class="topbar-meta">
        <a class="topbar-link" href="https://github.com/rizzleroc/CellAutomata" target="_blank" rel="noopener">
          github
          <span aria-hidden="true">↗</span>
        </a>
      </div>
    </header>

    <!-- ────── Main: canvas + sidebar ────────────────────────────────── -->
    <main id="main">
      <section class="stage" aria-label="Simulation">
        <div id="stage-banner" class="stage-banner" hidden aria-live="polite" aria-atomic="true">
          <span class="stage-banner-index" id="stage-banner-index"></span>
          <span class="stage-banner-title" id="stage-banner-title"></span>
          <span class="stage-banner-citation" id="stage-banner-citation"></span>
        </div>

        <div class="stage-frame">
          <canvas
            id="canvas"
            width="600"
            height="600"
            role="img"
            aria-label="Cellular automaton grid. Numerical state is summarized in the readout panel."
          >
            Cellular automaton visualization. Read the readout panel for the
            numerical state of the simulation.
          </canvas>
        </div>

        <div class="stage-meta">
          <p id="legend" class="legend" hidden></p>
          <p id="population" class="population" aria-live="off"></p>
        </div>
      </section>

      <aside class="rail" aria-label="Controls">
        <nav class="tabs" role="tablist">
          <button
            class="tab active"
            role="tab"
            aria-selected="true"
            data-tab="params"
            type="button"
          >parameters</button>
          <button
            class="tab"
            role="tab"
            aria-selected="false"
            data-tab="stage"
            type="button"
            hidden
          >stage</button>
          <button
            class="tab"
            role="tab"
            aria-selected="false"
            data-tab="export"
            type="button"
          >export</button>
        </nav>

        <!-- params tab -->
        <div class="tab-pane active" data-pane="params" role="tabpanel">
          <div id="presets-wrap" class="block" hidden>
            <h3 class="block-label">presets</h3>
            <div id="presets" class="chip-row"></div>
          </div>
          <div id="params-wrap" class="block" hidden>
            <h3 class="block-label">parameters</h3>
            <div id="params" class="param-list"></div>
          </div>
          <p id="params-empty" class="empty-state">
            This rule has no live-adjustable parameters.
          </p>
        </div>

        <!-- stage tab (pipeline-only) -->
        <div class="tab-pane" data-pane="stage" role="tabpanel" hidden>
          <div class="block">
            <h3 class="block-label">pipeline stage</h3>
            <div class="field-row">
              <label class="field">
                <span>stage</span>
                <select id="stage-select"></select>
              </label>
              <button id="promote" type="button" class="btn">promote →</button>
            </div>
            <div class="field-row">
              <label class="field checkbox">
                <input id="auto-promote" type="checkbox" />
                <span>auto-promote</span>
              </label>
              <label class="field narrow">
                <span>duration</span>
                <input id="stage-duration" type="number" min="1" max="500" step="5" />
              </label>
            </div>
          </div>
        </div>

        <!-- export tab -->
        <div class="tab-pane" data-pane="export" role="tabpanel" hidden>
          <div class="block">
            <h3 class="block-label">snapshot</h3>
            <div class="btn-row">
              <button id="download-snapshot" type="button" class="btn">↓ snapshot</button>
              <label class="btn file-input">
                ↑ load
                <input id="load-snapshot" type="file" accept=".json,application/json" />
              </label>
            </div>
          </div>
          <div class="block">
            <h3 class="block-label">image</h3>
            <button id="download-png" type="button" class="btn">↓ frame · png</button>
          </div>
          <div class="block">
            <h3 class="block-label">animated gif</h3>
            <div class="field-row">
              <label class="field narrow">
                <span>steps</span>
                <input id="gif-steps" type="number" min="2" max="240" value="60" />
              </label>
              <label class="field narrow">
                <span>fps</span>
                <input id="gif-fps" type="number" min="1" max="30" value="8" />
              </label>
            </div>
            <button id="export-gif" type="button" class="btn">↓ render gif</button>
            <p id="export-status" class="export-status" aria-live="polite"></p>
          </div>
        </div>
      </aside>
    </main>

    <!-- ────── Transport + tutorial ──────────────────────────────────── -->
    <footer class="transport">
      <div class="transport-controls">
        <button id="play" type="button" class="btn primary">▶ play</button>
        <button id="step" type="button" class="btn">step</button>
        <button id="reset" type="button" class="btn">reset</button>
        <label class="speed-field">
          <span class="speed-track">
            <input id="speed" type="range" min="1" max="60" value="20" />
          </span>
          <span class="speed-readout">
            <span class="readout-key">speed</span>
            <span id="speed-label">20/s</span>
          </span>
        </label>
      </div>

      <div class="transport-readout" aria-label="Live readout">
        <span class="readout-cell">
          <span class="readout-key">step</span>
          <span class="readout-val" id="step-count">0</span>
        </span>
        <span class="readout-sep">·</span>
        <span class="readout-cell">
          <span class="readout-key">fps</span>
          <span class="readout-val" id="fps">0</span>
        </span>
        <span class="readout-sep">·</span>
        <span class="readout-cell">
          <span class="readout-key">seed</span>
          <span class="readout-val" id="seed-out">—</span>
        </span>
      </div>

      <div class="transport-tutorial" aria-label="Tutorial">
        <button id="tutorial-prev" type="button" class="btn nav" aria-label="Previous tutorial step">◀</button>
        <span class="tutorial-counter" id="tutorial-counter" aria-live="polite">1/1</span>
        <button id="tutorial-next" type="button" class="btn nav" aria-label="Next tutorial step">▶</button>
        <p id="tutorial-body" class="tutorial-body" aria-live="polite"></p>
        <button id="tutorial-toggle" type="button" class="btn nav" aria-label="Show all tutorial steps">+</button>
      </div>
    </footer>

    <!-- Tutorial all-steps popover (hidden by default) -->
    <dialog id="tutorial-dialog" class="dialog" aria-labelledby="tutorial-dialog-title">
      <header class="dialog-head">
        <h2 id="tutorial-dialog-title" class="dialog-title">about this rule</h2>
        <button id="tutorial-dialog-close" type="button" class="btn nav" aria-label="Close">✕</button>
      </header>
      <ol id="tutorial-all" class="tutorial-list"></ol>
    </dialog>

    <!-- Toast-style inline error (overlays bottom-right) -->
    <p id="error" class="error" role="alert" hidden></p>

    <script src="/static/app.js"></script>
  </body>
</html>
